<!DOCTYPE html>
<html>
<head>
  <title>Merkle Blocks</title>
</head>
<body>

<h2>Merkle Blocks</h2>
<div id="blocks"></div>

<script>
async function loadBlocks() {
  try {
    const res = await fetch("http://localhost:5000/api/blocks");
    const data = await res.json();

    const container = document.getElementById("blocks");
    container.innerHTML = "";

    if (!data.length) {
      container.innerHTML = "<p>No blocks found</p>";
      return;
    }

    data.forEach((block, index) => {
      const div = document.createElement("div");
      div.style.border = "1px solid black";
      div.style.margin = "10px";
      div.style.padding = "10px";

      div.innerHTML = `
        <b>Block ${index + 1}</b><br/>
        Merkle Root: ${block.merkleRoot || block}<br/>
        Timestamp: ${block.timestamp || "N/A"}
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.error("UI Error:", err);
    document.getElementById("blocks").innerHTML =
      "<p>Error loading blocks</p>";
  }
}

loadBlocks();
</script>

</body>
</html>

async function initChartPage() {
  if (!selectedStock) {
    alert("No stock selected!");
    window.location.href = "home.html";
    return;
  }

  document.getElementById("chartTitle").innerText = selectedStock + " Chart";

  if (window.ethereum) {
    web3 = new Web3(window.ethereum);
    await window.ethereum.request({ method: "eth_requestAccounts" });
    contract = new web3.eth.Contract(abi, contractAddress);
  } else {
    alert("Install MetaMask");
    return;
  }

  renderChart();

  document.getElementById("buyBtn").onclick = buy;
  document.getElementById("sellBtn").onclick = sell;
}

async function renderChart() {
  const ctx = document.getElementById("chart").getContext("2d");

  // Mock 6 months weekly data
  const weeks = Array.from({length: 26}, (_, i) => `Week-${i+1}`);
  const dataPrices = [];
  let price = 100;
  for (let i = 0; i < 26; i++) {
    price += Math.floor(Math.random()*20 - 10);
    dataPrices.push(price);
  }

  const chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: weeks,
      datasets: [
        {
          label: selectedStock,
          data: dataPrices,
          borderColor: "#4ade80",
          borderWidth: 2,
          fill: false,
          tension: 0.2
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: true } },
      scales: { y: { beginAtZero: false } }
    }
  });
}

/* BUY/SELL */
async function buy() {
  const qty = parseInt(document.getElementById("qty").value);
  if (!qty || qty <= 0) return alert("Enter a valid quantity");
  const accounts = await web3.eth.getAccounts();
  await contract.methods.buyStock(selectedStock, qty).send({ from: accounts[0] });
  alert("Bought successfully!");
  renderChart(); // optional: refresh chart after trade
}

async function sell() {
  const qty = parseInt(document.getElementById("qty").value);
  if (!qty || qty <= 0) return alert("Enter a valid quantity");
  const accounts = await web3.eth.getAccounts();
  await contract.methods.sellStock(selectedStock, qty).send({ from: accounts[0] });
  alert("Sold successfully!");
  renderChart(); // optional: refresh chart after trade
}
